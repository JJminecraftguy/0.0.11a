name: Build and Upload JS + WASM
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
permissions:
  contents: write
  actions: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Build JavaScript client
        run: ./gradlew :target_teavm_javascript:makeMainOfflineDownload
      - name: Build WASM-GC client
        run: ./gradlew :target_teavm_wasm_gc:makeMainWasmClientBundle
      - name: Get short commit hash
        id: vars
        run: echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Package artifacts
        run: |
          mkdir -p dist/rel dist/web

          # Release downloads (offline HTML files)
          cp "target_teavm_javascript/javascript/Classic 0.0.11a-JS.html" "dist/rel/Classic_0.0.11a-JS.html"
          cp "target_teavm_wasm_gc/javascript_dist/Classic 0.0.11a-WASM.html" "dist/rel/Classic_0.0.11a-WASM.html"

          # GitHub Pages (WASM hosted build)
          cp target_teavm_wasm_gc/javascript_dist/index.html  dist/web/index.html
          cp target_teavm_wasm_gc/javascript_dist/bootstrap.js dist/web/bootstrap.js
          cp target_teavm_wasm_gc/javascript_dist/assets.epw  dist/web/assets.epw
          cp target_teavm_wasm_gc/javascript_dist/favicon.png  dist/web/favicon.png
      - name: Upload JavaScript artifact
        uses: actions/upload-artifact@v4
        with:
          name: javascript_${{ steps.vars.outputs.hash }}
          path: target_teavm_javascript/javascript/
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm_${{ steps.vars.outputs.hash }}
          path: target_teavm_wasm_gc/javascript_dist/
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.hash }}
          name: Release ${{ steps.vars.outputs.hash }}
          files: dist/rel/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      - name: Deploy GitHub Pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}
          publish_dir: dist/web
          publish_branch: gh-pages
          keep_files: false
